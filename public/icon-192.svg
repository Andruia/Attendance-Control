<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>
  <!-- Clock face circle -->
  <circle cx="96" cy="88" r="52" fill="none" stroke="#fff" stroke-width="6"/>
  <!-- Clock hands -->
  <line x1="96" y1="52" x2="96" y2="88" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
  <line x1="96" y1="88" x2="120" y2="80" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="96" cy="88" r="4" fill="#fff"/>
  <!-- Checkmark overlay -->
  <path d="M128 126 l-10 10 l-6 -6" fill="none" stroke="#a78bfa" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="96" y="168" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-weight="700" font-size="14" letter-spacing="1">ATTENDANCE</text>
</svg>
