<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Clock face circle -->
  <circle cx="256" cy="232" r="140" fill="none" stroke="#fff" stroke-width="14"/>
  <!-- Hour hand (short, pointing roughly 10 o'clock) -->
  <line x1="256" y1="232" x2="256" y2="132" stroke="#fff" stroke-width="14" stroke-linecap="round"/>
  <!-- Minute hand (long, pointing to 2) -->
  <line x1="256" y1="232" x2="316" y2="212" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="232" r="10" fill="#fff"/>
  <!-- Checkmark overlay -->
  <path d="M360 330 l-28 28 -16 -16" fill="none" stroke="#a78bfa" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Label -->
  <text x="256" y="450" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-weight="700" font-size="36" letter-spacing="2">ATTENDANCE</text>
</svg>
